<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>视唱小课堂 · v0.1 demo</title>
<style>
  :root {
    --bg-1: #f7f3ee;
    --bg-2: #fef8f0;
    --ink: #2a2438;
    --ink-soft: #6b647e;
    --gold: #f5c542;
    --gold-soft: #fde8a3;
    --gold-pale: #e9d9a5;
    --gold-muted: #b8ab8a;
    --red: #c8b18a;
    --red-deep: #9d8b68;
    --silence: #c8c4d1;
    --shadow: 0 8px 32px rgba(42, 36, 56, 0.08);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    color: var(--ink);
    overflow: hidden;
    height: 100vh;
    user-select: none;
  }
  #app {
    display: flex; flex-direction: column;
    height: 100vh; max-width: 720px; margin: 0 auto;
    padding: 16px; gap: 12px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 8px;
  }
  header h1 {
    margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0.5px;
  }
  .badge {
    font-size: 11px; padding: 3px 8px; border-radius: 12px;
    background: rgba(245, 197, 66, 0.2); color: #b8860b;
    font-weight: 600;
  }
  .target-card {
    background: white; border-radius: 20px; padding: 18px 20px;
    box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  .target-info { flex: 1; }
  .target-label { font-size: 12px; color: var(--ink-soft); margin-bottom: 4px; }
  .target-note { font-size: 32px; font-weight: 800; line-height: 1; }
  .target-hz { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
  .play-btn {
    width: 56px; height: 56px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, var(--gold) 0%, #e6a82e 100%);
    color: white; font-size: 22px; cursor: pointer;
    box-shadow: 0 4px 12px rgba(245, 197, 66, 0.4);
    transition: transform 0.15s;
  }
  .play-btn:active { transform: scale(0.92); }
  #stage {
    flex: 1; position: relative;
    background: white; border-radius: 24px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  #stage canvas { width: 100%; height: 100%; display: block; }
  .stage-overlay {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between;
    pointer-events: none;
  }
  .pill {
    background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px);
    padding: 6px 12px; border-radius: 12px;
    font-size: 12px; font-weight: 600;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
  }
  .pill.cents { color: var(--ink-soft); }
  .pill.cents.perfect { color: #b8860b; background: rgba(245, 197, 66, 0.18); }
  .pill.cents.good    { color: #a88b2d; background: rgba(233, 217, 165, 0.22); }
  .pill.cents.close   { color: var(--gold-muted); background: rgba(184, 171, 138, 0.18); }
  .pill.cents.silence { color: var(--ink-soft); background: rgba(200, 196, 209, 0.2); }
  .mic-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #c8c4d1; margin-right: 4px; vertical-align: middle;
    transition: background 0.3s;
  }
  .feedback-text {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 16px; font-weight: 600; color: var(--ink);
    pointer-events: none;
    transition: opacity 0.3s;
    text-align: center;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(6px);
    padding: 8px 18px; border-radius: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .controls {
    display: flex; gap: 10px;
  }
  .ctrl-btn {
    flex: 1; padding: 14px; border-radius: 16px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .ctrl-btn.primary {
    background: linear-gradient(135deg, #6ec6a8 0%, #5ab394 100%);
    color: white;
    box-shadow: 0 4px 12px rgba(110, 198, 168, 0.35);
  }
  .ctrl-btn.primary.recording {
    background: linear-gradient(135deg, var(--gold) 0%, #d6b35a 100%);
    box-shadow: 0 4px 12px rgba(214, 179, 90, 0.35);
    animation: pulse 1.2s infinite;
  }
  .ctrl-btn.secondary {
    background: white; color: var(--ink);
    box-shadow: var(--shadow);
  }
  .ctrl-btn:active { transform: scale(0.96); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 12px rgba(214, 179, 90, 0.35); }
    50%      { box-shadow: 0 4px 20px rgba(214, 179, 90, 0.6); }
  }
  .score-strip {
    display: flex; gap: 8px; justify-content: space-between;
    background: white; padding: 10px 14px; border-radius: 14px;
    box-shadow: var(--shadow); font-size: 13px;
  }
  .score-strip .item { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .score-strip .v { font-weight: 800; font-size: 18px; color: var(--ink); }
  .score-strip .l { font-size: 11px; color: var(--ink-soft); }
  .modal {
    position: fixed; inset: 0; background: rgba(42, 36, 56, 0.45);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px); z-index: 100;
    animation: fadeIn 0.3s;
  }
  .modal.hidden { display: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-card {
    background: white; border-radius: 24px; padding: 28px 24px;
    max-width: 340px; width: 90%; text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
  }
  .modal-card h2 { margin: 0 0 8px 0; font-size: 22px; }
  .modal-card p  { color: var(--ink-soft); font-size: 14px; line-height: 1.6; margin: 0 0 20px 0; }
  .modal-card button {
    width: 100%; padding: 14px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, var(--gold) 0%, #e6a82e 100%);
    color: white; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .note-picker {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 8px;
  }
  .note-btn {
    flex: 1; min-width: 56px; padding: 10px 6px; border-radius: 12px;
    border: 2px solid transparent; background: white;
    font-size: 14px; font-weight: 700; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    transition: all 0.15s;
  }
  .note-btn.active {
    border-color: var(--gold); background: var(--gold-soft);
    transform: scale(1.05);
  }
  .credit { font-size: 10px; color: var(--ink-soft); text-align: center; padding: 4px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🎵 视唱小课堂</h1>
    <div style="display:flex;gap:6px;align-items:center;">
      <span class="mic-dot" id="micIndicator" title="麦克风未开启"></span>
      <button id="toggleVoice" class="badge" style="border:none;cursor:pointer;" title="切换音域"><span id="voicePill">👤 选音域</span></button>
      <span class="badge">v0.1.3</span>
    </div>
  </header>

  <div class="target-card">
    <div class="target-info">
      <div class="target-label">跟唱这个音 →</div>
      <div class="target-note" id="targetNote">do (C4)</div>
      <div class="target-hz" id="targetHz">261.63 Hz</div>
    </div>
    <button class="play-btn" id="playBtn" title="播放标准音">▶</button>
  </div>

  <div class="note-picker" id="notePicker"></div>

  <div id="stage">
    <canvas id="canvas"></canvas>
    <div class="stage-overlay">
      <span class="pill" id="pillNote">--</span>
      <span class="pill cents" id="pillCents">-- cents</span>
    </div>
    <div class="feedback-text" id="feedback" style="opacity: 0;">深呼吸，跟我唱～</div>
  </div>

  <div class="score-strip">
    <div class="item"><span class="v" id="scoreNow">0</span><span class="l">当前分</span></div>
    <div class="item"><span class="v" id="scoreBest">0</span><span class="l">最佳</span></div>
    <div class="item"><span class="v" id="scoreStreak">0</span><span class="l">连续准 (帧)</span></div>
    <div class="item"><span class="v" id="scoreFps">--</span><span class="l">检测 Hz</span></div>
  </div>

  <div class="controls">
    <button class="ctrl-btn secondary" id="resetBtn">🔄 重置</button>
    <button class="ctrl-btn primary" id="micBtn">🎤 开始唱</button>
  </div>

  <div class="credit">Pitchy (YIN) · Web Audio API · Built tonight @ Haaland</div>
</div>

<div class="modal" id="welcome">
  <div class="modal-card">
    <h2>🎤 你的声音是？</h2>
    <p>
      选一下你的音域，我们会把 do re mi 的高度<br>
      调整到你舒服的位置。<br><br>
      <span style="font-size:11px;color:#a0a0a0">声音只在你的设备上分析，不上传任何服务器。</span>
    </p>
    <button id="pickMale" style="margin-bottom:10px;background:linear-gradient(135deg,#6ea8c6 0%,#5a93b0 100%);">👨 男声（do = C3）</button>
    <button id="pickFemale" style="background:linear-gradient(135deg,#e6a8c6 0%,#d093b0 100%);">👩 女声（do = C4）</button>
  </div>
</div>

<script type="module">
  import { PitchDetector } from 'https://esm.sh/pitchy@4.1.0';

  // ---------- URL flags ----------
  const URL_FLAGS = new URLSearchParams(location.search);
  const SHOW_PERF = URL_FLAGS.has('perf');
  const SHOW_RAW  = URL_FLAGS.has('raw');
  let frameCount = 0, fpsLastT = performance.now(), fpsValue = 0;

  // ---------- 调参口（供 Vivian 实测后调参）----------
  window.__tune = {
    centsThrottleMs: 0,
    trailSmoothing: 0,
    spiritEaseMs: 0,
    glowResponseMs: 100,
    silenceFreezeFrames: 0,
    iosLatencyOffsetMs: 0,
  };

  // 大调音程比例：do=1, re=9/8, mi=5/4, fa=4/3, sol=3/2, la=5/3, si=15/8, do↑=2
  const SOLFEGE = [
    { name: 'do',  ratio: 1.0 },
    { name: 're',  ratio: 9/8 },
    { name: 'mi',  ratio: 5/4 },
    { name: 'fa',  ratio: 4/3 },
    { name: 'sol', ratio: 3/2 },
  ];
  // 等程平均律修正（视唱训练用 12-TET 更标准）
  const SEMITONES_FROM_DO = { 'do':0, 're':2, 'mi':4, 'fa':5, 'sol':7 };
  const VOICE_PROFILES = {
    male:   { label: '👨 男声', baseHz: 130.81, baseLabel: 'C3' },   // do = C3
    female: { label: '👩 女声', baseHz: 261.63, baseLabel: 'C4' },   // do = C4
  };
  let voiceMode = sessionStorage.getItem('vt_voice') || null;
  function getNoteHz(solfegeName) {
    const base = VOICE_PROFILES[voiceMode || 'female'].baseHz;
    return base * Math.pow(2, SEMITONES_FROM_DO[solfegeName] / 12);
  }
  function buildNotes() {
    return SOLFEGE.map(s => {
      const hz = getNoteHz(s.name);
      return { name: s.name, label: hzToNoteName(hz), hz };
    });
  }
  let NOTES = [];
  let targetIdx = 0;
  const targetNoteEl = document.getElementById('targetNote');
  const targetHzEl   = document.getElementById('targetHz');
  const notePickerEl = document.getElementById('notePicker');

  function setTarget(idx) {
    targetIdx = idx;
    const t = NOTES[idx];
    targetNoteEl.textContent = `${t.name} (${t.label})`;
    targetHzEl.textContent = `${t.hz.toFixed(2)} Hz`;
    [...notePickerEl.children].forEach((b, i) => b.classList.toggle('active', i === idx));
    streak = 0; bestStreak = 0; updateScore();
  }
  // 占位按钮（refreshNotes 会填名字）
  SOLFEGE.forEach((n, i) => {
    const b = document.createElement('button');
    b.className = 'note-btn';
    b.textContent = n.name;
    b.onclick = () => setTarget(i);
    notePickerEl.appendChild(b);
  });
  function refreshNotes() {
    NOTES = buildNotes();
    [...notePickerEl.children].forEach((b, i) => {
      if (NOTES[i]) {
        b.textContent = NOTES[i].name;
        b.title = NOTES[i].label + ' (' + NOTES[i].hz.toFixed(1) + ' Hz)';
      }
    });
    if (NOTES[targetIdx]) setTarget(targetIdx);
  }

  // ---------- 标准音播放（Web Audio Oscillator） ----------
  let audioCtx = null;
  function ensureCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  document.getElementById('playBtn').onclick = () => {
    const ctx = ensureCtx();
    const t = NOTES[targetIdx];
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = t.hz;
    // 平滑包络
    const now = ctx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.25, now + 0.05);
    gain.gain.linearRampToValueAtTime(0.25, now + 1.2);
    gain.gain.linearRampToValueAtTime(0, now + 1.5);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 1.6);
  };

  // ---------- Pitch detection ----------
  const BUFFER_SIZE = 2048;
  let analyser = null, detector = null, sampleRate = 44100;
  let micStream = null, sourceNode = null;
  let buffer = new Float32Array(BUFFER_SIZE);
  let isRecording = false;

  // 检测频率统计
  let detectCount = 0, detectStartT = 0;

  async function startMic() {
    try {
      const ctx = ensureCtx();
      sampleRate = ctx.sampleRate;
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false,
        }
      });
      sourceNode = ctx.createMediaStreamSource(micStream);
      analyser = ctx.createAnalyser();
      analyser.fftSize = BUFFER_SIZE;
      sourceNode.connect(analyser);
      detector = PitchDetector.forFloat32Array(BUFFER_SIZE);
      detector.minVolumeDecibels = -40;
      isRecording = true;
      detectCount = 0; detectStartT = performance.now();
      lastVoiceTime = performance.now();
      micBtn.textContent = '⏸ 停止';
      micBtn.classList.add('recording');
      updateMicIndicator('on');
      showFeedback('开始唱～跟着 ' + NOTES[targetIdx].name, 1500);
    } catch (e) {
      alert('麦克风启动失败：' + e.message);
    }
  }
  function stopMic() {
    isRecording = false;
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    if (sourceNode) sourceNode.disconnect();
    micStream = null; sourceNode = null; analyser = null;
    micBtn.textContent = '🎤 开始唱';
    micBtn.classList.remove('recording');
    updateMicIndicator('off');
  }

  const micBtn = document.getElementById('micBtn');
  micBtn.onclick = () => isRecording ? stopMic() : startMic();
  document.getElementById('resetBtn').onclick = () => {
    streak = 0; bestStreak = 0; bestScore = 0; trail = [];
    updateScore();
  };

  // ---------- 评分（纯函数） ----------
  function hzToCents(detected, target) {
    if (!detected || detected <= 0) return null;
    return 1200 * Math.log2(detected / target);
  }
  function gradeCents(absCents) {
    if (absCents <= 10) return 'perfect';
    if (absCents <= 25) return 'good';
    if (absCents <= 50) return 'close';
    return 'try-again';
  }
  function hzToNoteName(hz) {
    if (!hz) return '--';
    const midi = Math.round(12 * Math.log2(hz / 440) + 69);
    const NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    return NAMES[((midi % 12) + 12) % 12] + (Math.floor(midi / 12) - 1);
  }

  // ---------- 状态 ----------
  let lastHz = null, lastClarity = 0, lastCents = null, lastGrade = null;
  let streak = 0, bestStreak = 0, bestScore = 0, currentScore = 0;
  let trail = []; // [{x, y, grade, alpha}]
  let lastVoiceTime = 0;  // 最后一次检测到有效人声的时间

  function updateMicIndicator(state) {
    const el = document.getElementById('micIndicator');
    if (!el) return;
    if (state === 'on')        { el.style.background = '#6ec6a8'; el.title = '麦克风开启中'; }
    else if (state === 'listening') { el.style.background = '#f5c542'; el.title = '在听，但没收到人声'; }
    else                       { el.style.background = '#c8c4d1'; el.title = '麦克风未开启'; }
  }

  const pillNoteEl = document.getElementById('pillNote');
  const pillCentsEl = document.getElementById('pillCents');
  const scoreNowEl = document.getElementById('scoreNow');
  const scoreBestEl = document.getElementById('scoreBest');
  const scoreStreakEl = document.getElementById('scoreStreak');
  const scoreFpsEl = document.getElementById('scoreFps');
  const feedbackEl = document.getElementById('feedback');

  let feedbackTimeout = null;
  function showFeedback(txt, ms = 1200) {
    feedbackEl.textContent = txt;
    feedbackEl.style.opacity = 1;
    clearTimeout(feedbackTimeout);
    feedbackTimeout = setTimeout(() => feedbackEl.style.opacity = 0, ms);
  }

  function updateScore() {
    scoreNowEl.textContent = currentScore;
    scoreBestEl.textContent = bestScore;
    scoreStreakEl.textContent = streak;
  }

  // ---------- 渲染 ----------
  const canvas = document.getElementById('canvas');
  const cctx = canvas.getContext('2d');
  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  setTimeout(resize, 50);

  // 频率 → Y 坐标（log scale，覆盖 100Hz - 1000Hz）
  function hzToY(hz, h) {
    const minLog = Math.log2(120);
    const maxLog = Math.log2(900);
    const r = (Math.log2(hz) - minLog) / (maxLog - minLog);
    return h - r * (h - 40) - 20;
  }

  let breathePhase = 0;
  function render() {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    cctx.clearRect(0, 0, w, h);

    // 背景渐变（场景隐喻雏形）
    const grd = cctx.createLinearGradient(0, 0, 0, h);
    grd.addColorStop(0, '#e8f4ff'); // 高音区天空
    grd.addColorStop(0.5, '#fef8e8'); // 中音区阳光
    grd.addColorStop(1, '#e0eef0'); // 低音区海面
    cctx.fillStyle = grd;
    cctx.fillRect(0, 0, w, h);

    // 目标音能量带（呼吸）
    breathePhase += 0.04;
    const breathe = 0.7 + 0.3 * Math.sin(breathePhase);
    const target = NOTES[targetIdx];
    const targetY = hzToY(target.hz, h);
    const bandHeight = Math.abs(hzToY(target.hz * Math.pow(2, 25/1200), h) - hzToY(target.hz * Math.pow(2, -25/1200), h));
    cctx.fillStyle = `rgba(245, 197, 66, ${0.18 * breathe})`;
    cctx.fillRect(0, targetY - bandHeight/2, w, bandHeight);
    // perfect 区
    const perfH = Math.abs(hzToY(target.hz * Math.pow(2, 10/1200), h) - hzToY(target.hz * Math.pow(2, -10/1200), h));
    cctx.fillStyle = `rgba(245, 197, 66, ${0.35 * breathe})`;
    cctx.fillRect(0, targetY - perfH/2, w, perfH);

    // 目标音中心线
    cctx.strokeStyle = 'rgba(230, 168, 46, 0.7)';
    cctx.lineWidth = 1.5;
    cctx.setLineDash([6, 6]);
    cctx.beginPath(); cctx.moveTo(0, targetY); cctx.lineTo(w, targetY); cctx.stroke();
    cctx.setLineDash([]);

    // 标签
    cctx.fillStyle = '#b8860b';
    cctx.font = '600 12px system-ui';
    cctx.fillText(`🎯 ${target.name}`, 10, targetY - 6);

    // 全部音名标注（淡）
    cctx.fillStyle = 'rgba(107, 100, 126, 0.4)';
    cctx.font = '10px system-ui';
    NOTES.forEach(n => {
      if (n === target) return;
      const y = hzToY(n.hz, h);
      cctx.fillText(n.name, w - 28, y + 3);
    });

    // 历史轨迹
    if (trail.length > 1) {
      cctx.lineWidth = 3;
      for (let i = 1; i < trail.length; i++) {
        const a = trail[i-1], b = trail[i];
        if (!a || !b) continue;
        const alpha = a.alpha;
        const color = a.grade === 'perfect' ? `rgba(245, 197, 66, ${alpha})` :
                      a.grade === 'good'    ? `rgba(233, 217, 165, ${alpha})` :
                      a.grade === 'close'   ? `rgba(184, 171, 138, ${alpha})` :
                                              `rgba(157, 139, 104, ${alpha * 0.6})`;
        cctx.strokeStyle = color;
        cctx.beginPath();
        cctx.moveTo(a.x, a.y);
        cctx.lineTo(b.x, b.y);
        cctx.stroke();
      }
    }

    // 当前音灵 (Sol)
    if (lastHz && lastClarity > 0.85) {
      const x = w - 60;
      const y = hzToY(lastHz, h);
      const glowColor = lastGrade === 'perfect' ? '#f5c542' :
                        lastGrade === 'good'    ? '#e9d9a5' :
                        lastGrade === 'close'   ? '#b8ab8a' : '#9d8b68';
      // 外晕
      const glowR = 22 + 6 * breathe + (lastGrade === 'perfect' ? 4 : 0);
      const radial = cctx.createRadialGradient(x, y, 0, x, y, glowR);
      radial.addColorStop(0, glowColor + 'cc');
      radial.addColorStop(1, glowColor + '00');
      cctx.fillStyle = radial;
      cctx.beginPath(); cctx.arc(x, y, glowR, 0, Math.PI * 2); cctx.fill();
      // 主体
      cctx.fillStyle = glowColor;
      cctx.beginPath(); cctx.arc(x, y, 10, 0, Math.PI * 2); cctx.fill();
      // 眼睛
      cctx.fillStyle = '#2a2438';
      cctx.beginPath(); cctx.arc(x - 3, y - 1, 1.5, 0, Math.PI * 2); cctx.fill();
      cctx.beginPath(); cctx.arc(x + 3, y - 1, 1.5, 0, Math.PI * 2); cctx.fill();
      // 嘴
      cctx.strokeStyle = '#2a2438'; cctx.lineWidth = 1.2;
      cctx.beginPath();
      if (lastGrade === 'perfect' || lastGrade === 'good') {
        cctx.arc(x, y + 2, 2.5, 0, Math.PI);
      } else {
        cctx.arc(x, y + 4, 2.5, Math.PI, 0); // 反弧 = 困惑
      }
      cctx.stroke();

      // perfect 粒子
      if (lastGrade === 'perfect' && Math.random() < 0.3) {
        trail.push({
          x: x + (Math.random() - 0.5) * 30,
          y: y + (Math.random() - 0.5) * 30,
          grade: 'perfect', alpha: 0.6, particle: true
        });
      }
    }

    // 衰减 trail
    trail.forEach(p => p.alpha *= 0.985);
    trail = trail.filter(p => p.alpha > 0.05);
    if (trail.length > 200) trail = trail.slice(-200);
  }

  // ---------- 主循环 ----------
  let lastDetectTime = 0;
  function loop() {
    // FPS 计算（供 ?perf=1）
    frameCount++;
    const fpsNow = performance.now();
    if (fpsNow - fpsLastT >= 1000) {
      fpsValue = Math.round(frameCount * 1000 / (fpsNow - fpsLastT));
      frameCount = 0;
      fpsLastT = fpsNow;
    }
    if (isRecording && analyser && detector) {
      analyser.getFloatTimeDomainData(buffer);
      const [pitch, clarity] = detector.findPitch(buffer, sampleRate);
      lastClarity = clarity;
      const now = performance.now();
      if (clarity > 0.85 && pitch > 60 && pitch < 1500) {
        lastHz = pitch;
        const target = NOTES[targetIdx];
        const cents = hzToCents(pitch, target.hz);
        // 修正：取最近八度（用户唱低八度也算对）
        let normCents = cents;
        while (normCents > 600) normCents -= 1200;
        while (normCents < -600) normCents += 1200;
        lastCents = normCents;
        lastGrade = gradeCents(Math.abs(normCents));

        // 更新轨迹
        const w = canvas.clientWidth;
        const x = w - 60;
        const y = hzToY(pitch, canvas.clientHeight);
        trail.push({ x, y, grade: lastGrade, alpha: 1 });

        // streak 处理：只有真 try-again 才清零；close 不中断；silence 不在这里走
        if (lastGrade === 'perfect' || lastGrade === 'good') {
          streak++;
          bestStreak = Math.max(bestStreak, streak);
          const pts = lastGrade === 'perfect' ? 3 : 1;
          currentScore += pts;
          if (currentScore > bestScore) bestScore = currentScore;
          lastVoiceTime = now;

          // 持续 1 秒（约 21 帧）满分触发提示
          if (streak === 21 && lastGrade === 'perfect') {
            showFeedback('✨ Perfect！再来一次试试 ' + NOTES[(targetIdx+1) % NOTES.length].name + '？', 2000);
          } else if (streak === 10) {
            showFeedback('稳住～就是这个感觉', 1000);
          }
        } else if (lastGrade === 'close') {
          // close 不加分但不打断 streak
          lastVoiceTime = now;
        } else if (lastGrade === 'try-again') {
          // 只有真的 try-again 才清 streak
          streak = 0;
          if (now - lastDetectTime > 1500) {
            const dir = normCents < 0 ? '高一点点' : '低一点点';
            showFeedback(`再 ${dir}～你离 ${target.name} 还差 ${Math.round(Math.abs(normCents))} 音分`, 1200);
            lastDetectTime = now;
          }
          lastVoiceTime = now;
        }

    pillNoteEl.textContent = `🎤 ${hzToNoteName(pitch)} (${pitch.toFixed(1)}Hz)`;
        pillCentsEl.textContent = `${normCents > 0 ? '+' : ''}${normCents.toFixed(0)} cents`;
        pillCentsEl.className = 'pill cents ' + lastGrade;

        detectCount++;
        if (detectCount % 20 === 0) {
          const elapsed = (now - detectStartT) / 1000;
          scoreFpsEl.textContent = (detectCount / elapsed).toFixed(1);
        }
        updateScore();
      } else {
        // 「无声音 / 不清晰」分支：不走评分、不清 streak、不染警警色
        lastHz = null;
        // streak 保留（8 秒内不动）【Rose 红线】
        if (now - lastVoiceTime > 8000) {
          streak = 0;
          updateScore();
        }
        pillNoteEl.textContent = '🎤 听不清…开始唱吧';
        pillCentsEl.textContent = '— —';
        pillCentsEl.className = 'pill cents silence';
        updateMicIndicator('listening');
      }
    }
    render();
    if (SHOW_PERF) {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(8, 8, 150, 56);
      ctx.fillStyle = '#fff';
      ctx.font = '11px ui-monospace,Menlo,monospace';
      ctx.fillText(`fps: ${fpsValue}`, 14, 22);
      ctx.fillText(`detect: ${(scoreFpsEl.textContent||'—')} Hz`, 14, 36);
      ctx.fillText(`raw cents: ${lastCents != null ? Math.round(lastCents) : '—'}`, 14, 50);
      ctx.fillText(`clarity: ${lastClarity ? lastClarity.toFixed(2) : '—'}`, 14, 62);
      ctx.restore();
    }
    requestAnimationFrame(loop);
  }
  loop();

  // ---------- Welcome + 音域选择 ----------
  function pickVoice(mode) {
    voiceMode = mode;
    sessionStorage.setItem('vt_voice', mode);
    refreshNotes();
    document.getElementById('welcome').classList.add('hidden');
  }
  document.getElementById('pickMale').onclick = () => pickVoice('male');
  document.getElementById('pickFemale').onclick = () => pickVoice('female');
  document.getElementById('toggleVoice').onclick = () => {
    voiceMode = voiceMode === 'male' ? 'female' : 'male';
    sessionStorage.setItem('vt_voice', voiceMode);
    refreshNotes();
    updateVoicePill();
    showFeedback(`已切换到 ${VOICE_PROFILES[voiceMode].label}（do = ${VOICE_PROFILES[voiceMode].baseLabel}）`, 1500);
  };
  function updateVoicePill() {
    const el = document.getElementById('voicePill');
    if (!el) return;
    el.textContent = voiceMode ? VOICE_PROFILES[voiceMode].label : '👤 选音域';
  }

  // 启动逻辑：有保存的 voiceMode 就跳过 welcome
  if (voiceMode && VOICE_PROFILES[voiceMode]) {
    document.getElementById('welcome').classList.add('hidden');
  }
  refreshNotes();
  updateVoicePill();

  // ---------- QA 注入接口 ----------
  window.__vocalTrainerQA = {
    hzToCents,
    gradeCents,
    hzToNoteName,
    getNotes: () => NOTES,
    setTarget: (idx) => setTarget(idx),
    setVoice: (mode) => pickVoice(mode),
    inject: (hz, clarity = 0.95) => {
      lastHz = hz; lastClarity = clarity;
      const t = NOTES[targetIdx];
      lastCents = hzToCents(hz, t.hz);
      let n = lastCents; while (n > 600) n -= 1200; while (n < -600) n += 1200;
      lastCents = n; lastGrade = gradeCents(Math.abs(n));
      return { detected: hz, target: t.hz, cents: n, grade: lastGrade };
    },
    version: '0.1.1',
  };
</script>
</body>
</html>
